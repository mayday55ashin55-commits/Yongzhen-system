<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>永偵辦公家具 屏風選色系統</title>
    <style>
        body { font-family: sans-serif; background: #eee; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 0; }
        .wrapper { display: flex; flex-direction: row; gap: 30px; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 95%; max-width: 1200px; box-sizing: border-box; min-height: 700px; }
        .preview-side { width: 380px; display: flex; flex-direction: column; align-items: center; flex-shrink: 0; background: #f9f9f9; border-radius: 10px; padding: 20px; box-sizing: border-box; }
        .hint-text { color: #007AFF; font-weight: bold; margin-bottom: 15px; font-size: 18px; }
        .stage-wrapper { display: flex; align-items: center; gap: 15px; }
        .labels { display: flex; flex-direction: column; justify-content: space-around; height: 400px; font-weight: bold; color: #333; font-size: 24px; }
        .main-stage { width: 300px; height: 400px; background: #fff; position: relative; border: 1px solid #ddd; }
        .zone { position: absolute; transition: 0.1s; cursor: pointer; background-size: cover; background-position: center; z-index: 1; }
        .active { box-shadow: inset 0 0 0 4px #007AFF; z-index: 5; }
        #zoneA { top: 4.8%; left: 16.5%; width: 66.8%; height: 26.5%; } 
        #zoneB { top: 31.8%; left: 16.5%; width: 66.8%; height: 29.8%; } 
        #zoneC { top: 62.0%; left: 16.5%; width: 66.8%; height: 33.0%; } 
        #top-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; object-fit: contain; }
        .status-display { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; margin-top: 25px; }
        .status-box { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 10px 2px; text-align: center; min-height: 65px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .status-box strong { color: #007AFF; font-size: 14px; margin-bottom: 4px; }
        .status-box span { font-size: 11px; color: #555; font-weight: bold; line-height: 1.2; }
        .controls { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 85vh; padding-right: 10px; }
        .palette-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; width: 100%; padding: 10px 0; }
        .swatch { padding: 8px; cursor: pointer; border: 1px solid #ddd; border-radius: 8px; text-align: center; background: #fafafa; }
        .swatch:hover { border-color: #007AFF; }
        .color-box { width: 75px; height: 75px; border-radius: 4px; margin: 0 auto 8px; background-size: cover; border: 1px solid rgba(0,0,0,0.1); }
        .swatch span { font-size: 11px; font-weight: bold; color: #444; display: block; min-height: 2.4em; }
        .accordion-header { background: #f8f9fa; color: #333; padding: 12px 15px; font-size: 16px; font-weight: bold; cursor: pointer; border: 1px solid #ddd; border-radius: 8px; margin-top: 5px; }
        .accordion-header.active { background: #007AFF; color: #fff; }
        .accordion-content { display: none; }
        .btn-frame { padding: 10px 18px; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; background: #fff; font-weight: bold; margin: 0 8px 8px 0; }
        .disclaimer-container { width: 100%; text-align: center; margin-top: 30px; }
        .disclaimer-text { color: #888; font-size: 14px; }
    </style>
</head>

            });

        });
